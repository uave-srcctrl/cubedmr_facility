# VHOST Configuration for WoundCare API
# Add this to: C:\xampp\apache\conf\extra\httpd-vhosts.conf

# ============================================================
# MAIN API (HTTPS) - api.local
# ============================================================
<VirtualHost *:443>
    ServerName api.local
    ServerAlias localhost 127.0.0.1
    DocumentRoot "C:/xampp/htdocs/api"
    
    SSLEngine on
    SSLCertificateFile "C:/xampp/apache/conf/ssl/api.local.crt"
    SSLCertificateKeyFile "C:/xampp/apache/conf/ssl/api.local.key"
    
    <Directory "C:/xampp/htdocs/api">
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog "logs/api-error.log"
    CustomLog "logs/api-access.log" combined
</VirtualHost>

# HTTP to HTTPS Redirect
<VirtualHost *:80>
    ServerName api.local
    ServerAlias localhost 127.0.0.1
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>
