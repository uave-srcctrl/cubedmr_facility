name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, Fix-compliences]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  PHP_VERSION: '8.2'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # Node.js Tests (wounddatacenter)
  # ============================================
  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wounddatacenter/package-lock.json

      - name: Install dependencies
        working-directory: wounddatacenter
        run: npm ci

      - name: Run TypeScript check
        working-directory: wounddatacenter
        run: npm run check

      - name: Run unit tests
        working-directory: wounddatacenter
        run: npm run test:unit

      - name: Run integration tests
        working-directory: wounddatacenter
        run: npm run test:integration

      - name: Generate coverage report
        working-directory: wounddatacenter
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: wounddatacenter/coverage
          fail_ci_if_error: false

  # ============================================
  # PHP Tests (api)
  # ============================================
  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, json, sqlsrv
          coverage: xdebug

      - name: Install Composer dependencies
        working-directory: api
        run: |
          composer require --dev phpunit/phpunit:^10.0 --no-interaction
          composer install --no-interaction --prefer-dist

      - name: Run unit tests
        working-directory: api
        run: ./vendor/bin/phpunit --testsuite Unit --colors=always

      - name: Run security tests
        working-directory: api
        run: ./vendor/bin/phpunit --testsuite Security --colors=always

      - name: Run performance tests
        working-directory: api
        run: ./vendor/bin/phpunit --testsuite Performance --colors=always

      - name: Generate coverage report
        working-directory: api
        run: ./vendor/bin/phpunit --coverage-clover=coverage.xml

  # ============================================
  # Security Scanning
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-node, test-php]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (Node.js)
        working-directory: wounddatacenter
        run: npm audit --audit-level=high || true

      - name: Run Composer audit (PHP)
        working-directory: api
        run: composer audit || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ============================================
  # Build
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test-node, test-php]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wounddatacenter/package-lock.json

      - name: Install dependencies
        working-directory: wounddatacenter
        run: npm ci

      - name: Build application
        working-directory: wounddatacenter
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: wounddatacenter/dist
          retention-days: 7

  # ============================================
  # Smoke Tests (after deployment)
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: wounddatacenter
        run: npm ci

      - name: Run smoke tests
        working-directory: wounddatacenter
        run: npm run test:smoke
        env:
          TEST_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          TEST_PHP_API_URL: ${{ secrets.PRODUCTION_PHP_API_URL }}

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Deploy to staging server
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
          # Example with SSH:
          # scp -r dist/* ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/var/www/staging/

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [smoke-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Deploy to production server
        run: |
          echo "Deploying to production..."
          # Add your production deployment commands here
          # Example: 
          # ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "cd /var/www/facility && git pull && npm ci && pm2 restart wounddatacenter"
