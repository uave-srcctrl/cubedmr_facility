name: 🚀 Build & Deploy React SPA (CubedMR Facility)

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip type-check and tests'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: 🔨 Build React SPA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Type check & Tests
        if: ${{ !inputs.skip_tests }}
        run: |
          npx tsc --noEmit
          npx vitest run

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package artifact
        run: tar -czf facility-deploy.tar.gz -C dist/public .

      - uses: actions/upload-artifact@v4
        with:
          name: facility-deploy
          path: facility-deploy.tar.gz
          retention-days: 7

  deploy:
    name: 🚀 Deploy to ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: facility-deploy

      - name: 📝 Detect Environment
        id: vars
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "env=$ENV" >> $GITHUB_OUTPUT

      - name: 🔐 Configure SSH
        id: ssh
        run: |
          mkdir -p ~/.ssh

          if [ "${{ steps.vars.outputs.env }}" = "production" ]; then
            echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
            SSH_HOST="${{ secrets.PROD_SSH_HOST }}"
            SSH_USER="${{ secrets.PROD_SSH_USER }}"
            SSH_PORT="${{ secrets.PROD_SSH_PORT || 22 }}"
            SERVER_APP_PATH="${{ secrets.PROD_APP_PATH }}"
          else
            echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
            SSH_HOST="${{ secrets.STAGING_SSH_HOST }}"
            SSH_USER="${{ secrets.STAGING_SSH_USER }}"
            SSH_PORT="${{ secrets.STAGING_SSH_PORT || 22 }}"
            SERVER_APP_PATH="${{ secrets.STAGING_APP_PATH }}"
          fi

          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "HOST=$SSH_HOST" >> $GITHUB_ENV
          echo "USER=$SSH_USER" >> $GITHUB_ENV
          echo "PORT=$SSH_PORT" >> $GITHUB_ENV
          echo "SERVER_APP_PATH=$SERVER_APP_PATH" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ steps.vars.outputs.env }}" >> $GITHUB_ENV

      - name: 🚀 Deploy with Script
        run: |
          echo "🌍 Deploying to: $ENVIRONMENT"
          echo "📂 SERVER_APP_PATH = $SERVER_APP_PATH"

          if [ -z "$SERVER_APP_PATH" ]; then
            echo "❌ ERROR: SERVER_APP_PATH está vacío"
            exit 1
          fi

          scp -P $PORT facility-deploy.tar.gz $USER@$HOST:/tmp/facility-deploy.tar.gz

          ssh -p $PORT $USER@$HOST "
            export ENVIRONMENT='$ENVIRONMENT'
            export SERVER_APP_PATH='$SERVER_APP_PATH'
            echo '================================'
            echo 'Variables enviadas:'
            echo 'ENVIRONMENT   = $ENVIRONMENT'
            echo 'SERVER_APP_PATH = $SERVER_APP_PATH'
            echo '================================'
            /home/deploy/deploy_cubedmr_facility.sh
          "

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa facility-deploy.tar.gz