name: 🚀 Build & Deploy React SPA

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [deploy-all]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip type-check and deploy directly'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📋 Install dependencies
        run: npm ci
      
      - name: ✅ Type check
        if: ${{ !inputs.skip_tests }}
        run: npx tsc --noEmit
      
      - name: 🧪 Run tests
        if: ${{ !inputs.skip_tests }}
        run: npx vitest run
      
      - name: 🔨 Build application
        run: npx vite build
        env:
          NODE_ENV: production
      
      - name: 📊 Build summary
        run: |
          echo "### Build Output" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/public/assets -name "*.js" -o -name "*.css" 2>/dev/null | while read f; do
            echo "| $(basename $f) | $(ls -lh $f | awk '{print $5}') |" >> $GITHUB_STEP_SUMMARY
          done
      
      - name: 📦 Create deployment package
        run: |
          tar -czf facility-deploy.tar.gz dist/public/
          echo "Package size: $(ls -lh facility-deploy.tar.gz | awk '{print $5}')"
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facility-deploy
          path: facility-deploy.tar.gz
          retention-days: 5

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    
    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: facility-deploy
      
      - name: 📝 Get deploy info
        id: info
        run: |
          echo "timestamp=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 7822 }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      
      - name: 📤 Upload to server
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || 7822 }} \
            facility-deploy.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/facility-deploy.tar.gz
      
      - name: 🚀 Deploy on server
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || 7822 }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
          set -e
          
          DEPLOY_PATH="/var/www/facility"
          SPA_PATH="$DEPLOY_PATH/dist/public"
          TIMESTAMP="${{ steps.info.outputs.timestamp }}"
          
          cd "$DEPLOY_PATH" || exit 1
          
          echo "=== Creating backup ==="
          mkdir -p backups
          if [ -d "dist/public" ]; then
            tar -czf "backups/spa-${TIMESTAMP}.tar.gz" dist/public/
            # Keep only last 5 backups
            ls -t backups/spa-*.tar.gz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
          fi
          
          echo "=== Extracting built SPA ==="
          tar -xzf /tmp/facility-deploy.tar.gz
          rm -f /tmp/facility-deploy.tar.gz
          
          echo "=== Setting permissions ==="
          chown -R www-data:www-data "$SPA_PATH"
          chmod -R 644 "$SPA_PATH"
          find "$SPA_PATH" -type d -exec chmod 755 {} \;
          
          echo "=== Verifying ==="
          # Apache serves /facility/ from dist/public/ — no restart needed
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost/facility/ 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ SPA responding (HTTP $HTTP_CODE)"
          else
            echo "⚠️ HTTP $HTTP_CODE — checking Apache..."
            systemctl status apache2 --no-pager -l | head -5
          fi
          
          echo "✅ React SPA deploy complete: $TIMESTAMP"
          DEPLOY_SCRIPT
      
      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa facility-deploy.tar.gz
      
      - name: 📊 Deploy summary
        if: success()
        run: |
          echo "### 🚀 React SPA Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.info.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** ${{ steps.info.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://cubed-mr.app/facility/" >> $GITHUB_STEP_SUMMARY
