name: 🚀 Deploy CubedMR Facility (React APP)

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deploy_react:
        description: 'Deploy React SPA'
        required: true
        default: true
        type: boolean
      skip_tests:
        description: 'Skip tests for faster deploy'
        required: false
        default: false
        type: boolean

jobs:
  build-react:
    name: 🔨 Build React SPA
    # Corre siempre en push o si en manual se marca deploy_react
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_react == true)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_tests) && 'npx tsc --noEmit' || 'echo "Skipping type-check"' }}
          ${{ (github.event_name == 'workflow_dispatch' && !inputs.skip_tests) && 'npx vitest run' || 'echo "Skipping tests"' }}
          npx vite build
        env:
          NODE_ENV: production

      - name: Package
        run: tar -czf facility-deploy.tar.gz dist/public/

      - uses: actions/upload-artifact@v4
        with:
          name: facility-deploy
          path: facility-deploy.tar.gz
          retention-days: 3

  deploy-react:
    name: 🚀 Deploy React SPA - ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    needs: build-react
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_react == true)
    runs-on: ubuntu-latest
    
    environment:
      name: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      url: ${{ vars.DEPLOY_URL || 'https://your-app.com' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: facility-deploy

      - name: 📝 Detect Environment
        id: info
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          if [ "$ENV" = "production" ]; then
            echo "deploy_path=/var/www/production/wounddatacenter" >> $GITHUB_OUTPUT
            echo "deploy_user=${{ secrets.PROD_SSH_USER }}" >> $GITHUB_OUTPUT
            echo "deploy_host=${{ secrets.PROD_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "deploy_port=${{ secrets.PROD_SSH_PORT || 22 }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=/var/www/stage/wounddatacenter" >> $GITHUB_OUTPUT
            echo "deploy_user=${{ secrets.STAGING_SSH_USER }}" >> $GITHUB_OUTPUT
            echo "deploy_host=${{ secrets.STAGING_SSH_HOST }}" >> $GITHUB_OUTPUT
            echo "deploy_port=${{ secrets.STAGING_SSH_PORT || 22 }}" >> $GITHUB_OUTPUT
          fi

      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          if [ "${{ steps.info.outputs.environment }}" = "production" ]; then
            echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          else
            echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ steps.info.outputs.deploy_port }} -H ${{ steps.info.outputs.deploy_host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Upload & Deploy
        run: |
          echo "🌍 Deploying to: ${{ steps.info.outputs.environment }}"
          
          scp -P ${{ steps.info.outputs.deploy_port }} \
            facility-deploy.tar.gz \
            ${{ steps.info.outputs.deploy_user }}@${{ steps.info.outputs.deploy_host }}:/tmp/facility-deploy.tar.gz

          ssh -p ${{ steps.info.outputs.deploy_port }} \
              ${{ steps.info.outputs.deploy_user }}@${{ steps.info.outputs.deploy_host }} << 'EOF'
          set -e
          
          DEPLOY_PATH="${{ steps.info.outputs.deploy_path }}"
          cd "$DEPLOY_PATH"
          mkdir -p backups

          [ -d "dist/public" ] && tar -czf "backups/spa-$(date +%Y%m%d%H%M%S).tar.gz" dist/public/
          ls -t backups/spa-*.tar.gz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true

          tar -xzf /tmp/facility-deploy.tar.gz && rm -f /tmp/facility-deploy.tar.gz

          chown -R www-data:www-data dist/public
          chmod -R 644 dist/public && find dist/public -type d -exec chmod 755 {} \;

          echo "✅ Deploy completed successfully on ${{ steps.info.outputs.environment }}"
          EOF

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa facility-deploy.tar.gz