name: Deploy CubedMR_Facility (Flutter Web)

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - uses: actions/checkout@v5

      - name: Deploying to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_HOST || secrets.STAGING_SSH_HOST }}
          port: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_PORT || secrets.STAGING_SSH_PORT }}
          username: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_USER || secrets.STAGING_SSH_USER }}
          key: ${{ github.ref == 'refs/heads/main' && secrets.PROD_SSH_PRIVATE_KEY || secrets.STAGING_SSH_PRIVATE_KEY }}
          
          script: |
            # Print CLI version info
            echo "======= CLI Version Information ======="
            ssh -V 2>&1 | head -1 || echo "OpenSSH available"
            echo "======================================="
            echo ""
            
            # Determine environment and set app path
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              SERVER_APP_PATH="${{ secrets.PROD_APP_PATH }}"
              BASE_URL="${{ secrets.PROD_BASE_URL }}"
              ENVIRONMENT="production"
              echo "🚀 Deploying to PRODUCTION"
            else
              SERVER_APP_PATH="${{ secrets.STAGING_APP_PATH }}"
              BASE_URL="${{ secrets.STAGING_BASE_URL }}"
              ENVIRONMENT="staging"
              echo "🟡 Deploying to STAGING"
            fi

            # Validate APP_PATH is not empty
            if [ -z "$SERVER_APP_PATH" ]; then
              echo "❌ ERROR: APP_PATH is empty or not configured"
              echo "Check that ${{ github.ref == 'refs/heads/main' && 'PROD_APP_PATH' || 'STAGING_APP_PATH' }} secret is configured in GitHub"
              exit 1
            fi

            echo "📦 Deploy path: $SERVER_APP_PATH"
            echo "🔧 Environment: $ENVIRONMENT"
            echo "📅 Deploy timestamp: $(date '+%Y%m%d-%H%M%S')"
            echo ""

            # Execute facility deploy script passing all parameters
            export ENVIRONMENT="$ENVIRONMENT"
            export SERVER_APP_PATH="$SERVER_APP_PATH"
            export BASE_URL="$BASE_URL"
            /home/deploy/deploy_cubedmr_facility.sh