name: 🚀 Build & Deploy React SPA

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_tests:
        description: 'Skip type-check and tests'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: 🔨 Build React SPA
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci --frozen-lockfile

      - name: ✅ Type check
        if: ${{ !inputs.skip_tests }}
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        if: ${{ !inputs.skip_tests }}
        run: npx vitest run

      - name: 🔨 Build application
        run: npm run build          # ← Mejor usar el script del package.json
        env:
          NODE_ENV: production

      - name: 📦 Create deployment package
        run: |
          tar -czf facility-deploy.tar.gz -C dist/public .
          echo "Package size: $(ls -lh facility-deploy.tar.gz | awk '{print $5}')"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facility-deploy
          path: facility-deploy.tar.gz
          retention-days: 5
  deploy:
    name: 🚀 Deploy to ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: facility-deploy

      - name: 📝 Detect Environment
        id: vars
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            PREFIX="PROD"
          else
            PREFIX="STAGING"
          fi

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "🎯 Deploying to: $ENV"

      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[format('{0}_SSH_PRIVATE_KEY', steps.vars.outputs.prefix)] }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets[format('{0}_SSH_PORT', steps.vars.outputs.prefix)] || 22 }} \
            -H ${{ secrets[format('{0}_SSH_HOST', steps.vars.outputs.prefix)] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Deploy on Server
        run: |
          ENV=${{ steps.vars.outputs.env }}
          PREFIX=${{ steps.vars.outputs.prefix }}
          
          HOST="${{ secrets[format('{0}_SSH_HOST', steps.vars.outputs.prefix)] }}"
          USER="${{ secrets[format('{0}_SSH_USER', steps.vars.outputs.prefix)] }}"
          PORT="${{ secrets[format('{0}_SSH_PORT', steps.vars.outputs.prefix)] || 22 }}"
          APP_PATH="${{ secrets[format('{0}_APP_PATH', steps.vars.outputs.prefix)] }}/cubedmr_facility"

          echo "🌍 Deploying to: $ENV"
          echo "📂 Path: $APP_PATH"

          scp -P $PORT facility-deploy.tar.gz $USER@$HOST:/tmp/facility-deploy.tar.gz

          ssh -p $PORT $USER@$HOST << 'DEPLOY_SCRIPT'
            set -e
            cd $APP_PATH

            echo "=== Creating backup ==="
            mkdir -p backups
            if [ -d "dist/public" ]; then
              tar -czf "backups/spa-$(date +%Y%m%d-%H%M%S).tar.gz" dist/public/
              ls -t backups/spa-*.tar.gz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true
            fi

            echo "=== Extracting new build ==="
            rm -rf dist/public/*
            tar -xzf /tmp/facility-deploy.tar.gz -C .
            rm -f /tmp/facility-deploy.tar.gz

            echo "=== Setting permissions for Apache (AlmaLinux) ==="
            # Solo cambiamos ownership de los archivos web
            if [ -d "dist/public" ]; then
              chown -R apache:apache dist/public
              find dist/public -type d -exec chmod 755 {} \;
              find dist/public -type f -exec chmod 644 {} \;
              echo "✅ Permissions applied to dist/public"
            fi

            # Permisos generales seguros
            chmod 755 . 2>/dev/null || true
            echo "✅ Deployment completed successfully on $ENV"
          DEPLOY_SCRIPT

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa facility-deploy.tar.gz