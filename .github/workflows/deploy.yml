name: 🚀 Deploy React SPA (CubedMR Facility)

on:
  push:
    branches: [ main, stage ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a desplegar'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci --frozen-lockfile
          npm run build
        env:
          NODE_ENV: production
          # Si necesitas pasar variables de entorno en build time:
          VITE_BASE_URL: ${{ secrets[format('{0}_BASE_URL', inputs.environment == 'production' && 'PROD' || 'STAGING')] }}

      - name: Package Build
        run: tar -czf deploy.tar.gz -C dist .

      - name: 📝 Detect Environment
        id: vars
        run: |
          ENV=${{ inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "prefix=${ENV == 'production' && 'PROD' || 'STAGING'}" >> $GITHUB_OUTPUT

      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[format('{0}_SSH_PRIVATE_KEY', steps.vars.outputs.prefix)] }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets[format('{0}_SSH_PORT', steps.vars.outputs.prefix)] || 22 }} \
            -H ${{ secrets[format('{0}_SSH_HOST', steps.vars.outputs.prefix)] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Deploy to Server
        run: |
          ENV=${{ steps.vars.outputs.env }}
          PREFIX=${{ steps.vars.outputs.prefix }}
          
          HOST="${{ secrets[format('{0}_SSH_HOST', steps.vars.outputs.prefix)] }}"
          USER="${{ secrets[format('{0}_SSH_USER', steps.vars.outputs.prefix)] }}"
          PORT="${{ secrets[format('{0}_SSH_PORT', steps.vars.outputs.prefix)] || 22 }}"
          APP_PATH="${{ secrets[format('{0}_APP_PATH', steps.vars.outputs.prefix)] }}/cubedmr_facility"

          echo "🌍 Deploying to: $ENV"
          echo "📂 Path: $APP_PATH"
          echo "🖥️  Host: $HOST"
          echo "👤 User: $USER"
          echo "🔌 Port: $PORT"

          # Upload the package
          scp -P $PORT deploy.tar.gz $USER@$HOST:/tmp/deploy.tar.gz

          # Remote deployment
          ssh -p $PORT $USER@$HOST << 'EOF'
            set -e
            cd ${{ steps.vars.outputs.env == 'production' && secrets.PROD_APP_PATH || secrets.STAGING_APP_PATH }}/cubedmr_facility

            echo "📦 Creating backup..."
            mkdir -p backups
            tar -czf "backups/spa-$(date +%Y%m%d-%H%M%S).tar.gz" . 2>/dev/null || true

            ls -t backups/spa-*.tar.gz 2>/dev/null | tail -n +6 | xargs rm -f 2>/dev/null || true

            echo "🧹 Removing old files..."
            rm -rf *

            echo "📥 Extracting new build..."
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            echo "🔧 Setting permissions..."
            chown -R www-data:www-data .
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;

            echo "✅ Deployment completed successfully on $ENV"
          EOF