name: 🚀 Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip type-check and deploy directly'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📋 Install dependencies
        run: npm ci
      
      - name: ✅ Type check
        if: ${{ !inputs.skip_tests }}
        run: npm run check || true
      
      - name: 🔨 Build application
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: 📊 Build summary
        run: |
          echo "### Build Output" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lhS dist/public/assets/*.js 2>/dev/null | awk '{print "| " $NF " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server bundle:** $(ls -lh dist/index.cjs | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
      
      - name: 📦 Create deployment package
        run: |
          # Only include what's needed for production runtime
          tar -czf facility-deploy.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            ecosystem.config.js
          ls -lh facility-deploy.tar.gz
      
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: facility-deploy
          path: facility-deploy.tar.gz
          retention-days: 5

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production
    
    steps:
      - name: 📥 Download artifact
        uses: actions/download-artifact@v4
        with:
          name: facility-deploy
      
      - name: 📝 Get deploy info
        id: info
        run: |
          echo "timestamp=$(date -u +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
      - name: 🔐 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 7822 }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
      
      - name: 📤 Upload to server
        run: |
          scp -P ${{ secrets.DEPLOY_PORT || 7822 }} \
            facility-deploy.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/facility-deploy.tar.gz
      
      - name: 🚀 Deploy on server
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT || 7822 }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
          set -e
          
          DEPLOY_PATH="/var/www/facility"
          TIMESTAMP="${{ steps.info.outputs.timestamp }}"
          
          # Setup Node/PM2 path
          export PATH="/root/.nvm/versions/node/v20.19.6/bin:$PATH"
          PM2_BIN="/root/.nvm/versions/node/v20.19.6/lib/node_modules/pm2/bin/pm2"
          
          cd "$DEPLOY_PATH" || exit 1
          
          echo "=== Creating backup ==="
          mkdir -p backups
          if [ -d "dist" ]; then
            cp -r dist "backups/dist-${TIMESTAMP}"
            # Keep only last 5 backups
            ls -dt backups/dist-* 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true
          fi
          
          echo "=== Extracting pre-built artifacts ==="
          tar -xzf /tmp/facility-deploy.tar.gz
          rm -f /tmp/facility-deploy.tar.gz
          
          echo "=== Syncing production dependencies ==="
          npm ci --production --ignore-scripts 2>/dev/null || npm install --production 2>/dev/null || true
          
          echo "=== Restarting service ==="
          $PM2_BIN restart wounddatacenter 2>/dev/null || \
            $PM2_BIN start dist/index.cjs --name wounddatacenter 2>/dev/null
          $PM2_BIN save 2>/dev/null || true
          
          sleep 3
          
          echo "=== Verifying ==="
          $PM2_BIN list
          
          # Quick health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
            echo "✅ Service responding (HTTP $HTTP_CODE)"
          else
            echo "⚠️ HTTP $HTTP_CODE - checking logs..."
            $PM2_BIN logs wounddatacenter --lines 10 --nostream 2>/dev/null || true
          fi
          
          echo "✅ Deploy complete: $TIMESTAMP"
          DEPLOY_SCRIPT
      
      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa facility-deploy.tar.gz
      
      - name: 📊 Deploy summary
        if: success()
        run: |
          echo "### 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.info.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** ${{ steps.info.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
