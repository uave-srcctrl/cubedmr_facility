# HTTP → HTTPS Redirect
<VirtualHost *:80>
    ServerName facility.com
    ServerAlias www.facility.com
    
    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    # Allow ACME challenges
    ProxyPass /.well-known/acme-challenge !
</VirtualHost>

# HTTPS VirtualHost
<VirtualHost *:443>
    ServerName facility.com
    ServerAlias www.facility.com
    ServerAdmin admin@facility.com
    
    # ===== SSL/TLS Configuration =====
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/facility.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/facility.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/facility.com/chain.pem
    
    # SSL Settings (Mozilla Intermediate)
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on
    SSLCompression off
    SSLSessionID none
    
    # HSTS (HTTP Strict Transport Security)
    Header set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    
    # ===== Logging =====
    ErrorLog ${APACHE_LOG_DIR}/facility-error.log
    CustomLog ${APACHE_LOG_DIR}/facility-access.log combined
    
    # ===== Document Root =====
    DocumentRoot /var/www/facility
    <Directory /var/www/facility>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    
    # ===== REVERSE PROXY CONFIGURATION =====
    
    # Enable proxy modules
    ProxyPreserveHost On
    ProxyRequests Off
    
    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:5000/$1" [P,L]
    
    # Main proxy rule - forward all requests to Node.js app
    ProxyPass / http://127.0.0.1:5000/ retry=5 acquire=3000 timeout=600 Keepalive=On
    ProxyPassReverse / http://127.0.0.1:5000/
    
    # Proxy headers
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s
    RequestHeader set X-Forwarded-For %{HTTP:X-Forwarded-For}e
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host %{HTTP_HOST}s
    RequestHeader set X-Forwarded-Port "443"
    
    # Connection settings
    SetEnvIf Request_URI "^/api" nocompress
    SetEnvIf Request_URI "^/facility/public/" nocompress
    
    # ===== Static Content Caching =====
    <LocationMatch "^/facility/public/">
        Header set Cache-Control "public, max-age=31536000, immutable"
        Header set ETag ""
        FileETag None
    </LocationMatch>
    
    <LocationMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=604800"
    </LocationMatch>
    
    # ===== Content Compression =====
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE text/javascript application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml+rss application/atom+xml image/svg+xml
        
        # Don't compress binary files
        SetEnvIfNoCase Request_URI "\.(?:gif|jpe?g|png|zip|gz)$" no-gzip dont-vary
    </IfModule>
    
    # ===== Security Headers =====
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"
    Header set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    
    # ===== API Security =====
    <Location /api>
        # Limit request rate for API endpoints
        SetEnvIf Request_Method POST rate-limit=true
        SetEnvIf Request_URI "^/api/get$" rate-limit=true
    </Location>
    
    # ===== URL Rewriting for SPA =====
    <IfModule mod_rewrite.c>
        RewriteEngine On
        
        # Don't rewrite if it's a real file or directory
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [QSA,L]
        
        # Don't rewrite API calls
        RewriteCond %{REQUEST_URI} !^/api
        
        # Rewrite all other requests to index
        RewriteRule ^ /index.html [QSA,L]
    </IfModule>
    
    # ===== Status and Monitoring =====
    <Location /server-status>
        SetHandler server-status
        Require ip 127.0.0.1 ::1
    </Location>
</VirtualHost>
