# Apache Virtual Hosts Configuration for PRODUCTION
# This file should replace httpd-vhosts.conf in production

# ============================================================
# PRODUCTION API (HTTPS with Let's Encrypt)
# ============================================================
<VirtualHost *:443>
    ServerName cubed-mr.app
    ServerAlias www.cubed-mr.app
    DocumentRoot "/var/www/api/prod"
    
    SSLEngine on
    # Use Let's Encrypt certificates
    SSLCertificateFile /etc/letsencrypt/live/cubed-mr.app/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/cubed-mr.app/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/cubed-mr.app/chain.pem
    
    # Modern SSL Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    
    <Directory "/var/www/api/prod">
        AllowOverride All
        Require all granted
        
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [QSA,L]
        </IfModule>
    </Directory>
    
    ErrorLog /var/log/apache2/api-error.log
    CustomLog /var/log/apache2/api-access.log combined
    
    # Security Headers
    Header set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
</VirtualHost>

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName cubed-mr.app
    ServerAlias www.cubed-mr.app
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>
